name: VideoCorruptor
options:
  bundleIdPrefix: com.videotools
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: true

targets:
  VideoCorruptor:
    type: application
    platform: macOS
    sources:
      - VideoCorruptor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.videotools.VideoCorruptor
        PRODUCT_NAME: VideoCorruptor
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: VideoCorruptor
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        CODE_SIGN_ENTITLEMENTS: VideoCorruptor/App/VideoCorruptor.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: false
        ENABLE_HARDENED_RUNTIME: true
